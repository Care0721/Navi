<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 迷失档案 | Navi·Gal</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #03030f;
      --cyan: #00d4ff;
      --pink: #ff3cac;
      --purple: #7b2fff;
      --ghost: rgba(200,220,255,0.88);
      --dim: rgba(180,200,240,0.45);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { height:100%; overflow:hidden; }
    body {
      height:100%;
      background: var(--void);
      color: var(--ghost);
      overflow:hidden;
      cursor: none;
      font-family: 'Noto Serif SC', serif;
    }

    /* ── Custom cursor ── */
    #cur {
      position:fixed; width:6px; height:6px;
      background: var(--cyan); border-radius:50%;
      pointer-events:none; z-index:9999;
      transform:translate(-50%,-50%);
      box-shadow: 0 0 8px var(--cyan), 0 0 20px rgba(0,212,255,0.4);
      transition: width .15s, height .15s;
    }
    #cur-ring {
      position:fixed; width:28px; height:28px;
      border:1px solid rgba(0,212,255,0.5);
      border-radius:50%; pointer-events:none; z-index:9998;
      transform:translate(-50%,-50%);
    }
    #cur-cross-h, #cur-cross-v {
      position:fixed; pointer-events:none; z-index:9997;
      background: rgba(0,212,255,0.2);
      transform:translate(-50%,-50%);
    }
    #cur-cross-h { width:20px; height:1px; }
    #cur-cross-v { width:1px; height:20px; }

    /* ── Overlays ── */
    .scanlines {
      position:fixed; inset:0; pointer-events:none; z-index:200;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }
    .vignette {
      position:fixed; inset:0; pointer-events:none; z-index:199;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(3,3,15,0.85) 100%);
    }

    /* ── BG Canvas ── */
    #bg { position:fixed; inset:0; z-index:0; }

    /* ── Floating runes ── */
    .rune {
      position:fixed; pointer-events:none;
      font-family: 'Zen Old Mincho', serif;
      color: rgba(0,212,255,0.10);
      animation: floatUp linear both;
      user-select:none;
    }
    @keyframes floatUp {
      from { transform:translateY(105vh) rotate(0deg); opacity:0; }
      8%   { opacity:1; }
      85%  { opacity:0.6; }
      to   { transform:translateY(-8vh) rotate(20deg); opacity:0; }
    }

    /* ── Scene layout ── */
    .scene {
      position:relative; z-index:10;
      height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:0;
    }

    /* ── 404 Glitch ── */
    .error-code {
      font-family:'Share Tech Mono', monospace;
      font-size: clamp(5.5rem,18vw,12rem);
      font-weight:900; line-height:1;
      letter-spacing:-0.04em;
      color:transparent;
      -webkit-text-stroke: 1.5px rgba(0,212,255,0.5);
      position:relative;
      animation: glitchBase 5s 1s ease-in-out infinite, fadeSlideIn 0.9s both;
    }
    .error-code::before, .error-code::after {
      content:'404';
      position:absolute; inset:0;
      font-family:'Share Tech Mono', monospace;
      -webkit-text-stroke: 0;
      pointer-events:none;
    }
    .error-code::before {
      color: var(--pink);
      clip-path: polygon(0 0,100% 0,100% 42%,0 42%);
      animation: glitchHi 5s 1s ease-in-out infinite;
      opacity:0.75;
    }
    .error-code::after {
      color: var(--cyan);
      clip-path: polygon(0 58%,100% 58%,100% 100%,0 100%);
      animation: glitchLo 5s 1.05s ease-in-out infinite;
      opacity:0.75;
    }
    @keyframes glitchBase {
      0%,88%,100% { transform:none; filter:none; }
      89% { transform:skewX(-3deg) translateX(-4px); filter:brightness(1.2); }
      90% { transform:skewX(2deg) translateX(3px); }
      91% { transform:none; }
      92% { transform:skewX(-1deg); }
      93% { transform:none; }
    }
    @keyframes glitchHi {
      0%,88%,100% { transform:none; opacity:0.75; }
      89% { transform:translateX(-8px); opacity:1; }
      90% { transform:translateX(5px); }
      91% { transform:none; opacity:0.75; }
    }
    @keyframes glitchLo {
      0%,88%,100% { transform:none; opacity:0.75; }
      89% { transform:translateX(8px); opacity:1; }
      90% { transform:translateX(-5px); }
      91% { transform:none; opacity:0.75; }
    }

    /* ── Spirit wrap ── */
    .spirit-wrap {
      position:relative; width:160px; height:195px;
      margin: -0.5rem 0;
      animation: floatBob 3.6s 1.2s ease-in-out infinite, fadeSlideIn 1s 0.25s both;
      filter: drop-shadow(0 0 18px rgba(0,180,255,0.35)) drop-shadow(0 0 40px rgba(0,100,200,0.2));
    }
    @keyframes floatBob {
      0%,100% { transform:translateY(0) rotate(-0.5deg); }
      50% { transform:translateY(-14px) rotate(0.5deg); }
    }
    .spirit-wrap::after {
      content:'';
      position:absolute; bottom:-4px; left:50%;
      transform:translateX(-50%);
      width:80px; height:18px;
      border-radius:50%;
      background: radial-gradient(ellipse, rgba(0,212,255,0.35) 0%, transparent 70%);
      animation: shadowPulse 3.6s 1.2s ease-in-out infinite;
    }
    @keyframes shadowPulse {
      0%,100% { opacity:0.6; transform:translateX(-50%) scaleX(1); }
      50% { opacity:0.3; transform:translateX(-50%) scaleX(0.7); }
    }

    /* ── Info Card ── */
    .card {
      position:relative;
      background: rgba(8,8,32,0.65);
      border:1px solid rgba(0,212,255,0.18);
      backdrop-filter: blur(24px) saturate(1.4);
      padding: 2.2rem 2.8rem 2.6rem;
      text-align:center;
      max-width:440px; width:88vw;
      clip-path: polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px);
      animation: fadeSlideIn 0.9s 0.5s both;
    }

    /* holographic shimmer border */
    .card::before {
      content:'';
      position:absolute; inset:-1px; z-index:-1;
      background: conic-gradient(from var(--angle,0deg),
        var(--cyan), var(--pink), var(--purple), var(--cyan));
      clip-path: polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px);
      animation: rotateBorder 6s linear infinite;
      opacity:0.3;
    }
    @property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
    @keyframes rotateBorder { to { --angle:360deg; } }

    /* corner accents */
    .card::after {
      content:'';
      position:absolute; top:8px; right:8px;
      width:18px; height:18px;
      border-top:1px solid var(--cyan); border-right:1px solid var(--cyan);
      opacity:0.55;
    }
    .c-bl {
      position:absolute; bottom:8px; left:8px;
      width:18px; height:18px;
      border-bottom:1px solid var(--pink); border-left:1px solid var(--pink);
      opacity:0.55;
    }

    .sys-label {
      font-family:'Share Tech Mono', monospace;
      font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase;
      color: var(--cyan); opacity:0.55;
      margin-bottom:1.1rem;
    }
    .sys-label .blink { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    h1 {
      font-family:'Zen Old Mincho', serif;
      font-size:clamp(1.1rem,3vw,1.35rem);
      font-weight:700; letter-spacing:0.12em;
      color:#ddeeff; margin-bottom:0.8rem;
    }

    .desc {
      font-size:0.8rem; color:var(--dim);
      line-height:2; letter-spacing:0.05em;
      margin-bottom:1.8rem;
    }
    .desc-code {
      display:block; margin-top:0.5rem;
      font-family:'Share Tech Mono', monospace;
      font-size:0.62rem; letter-spacing:0.15em;
      color: rgba(0,212,255,0.3);
    }

    /* ── Return Button ── */
    .btn {
      display:inline-flex; align-items:center; gap:0.5rem;
      padding:0.7rem 1.9rem;
      background:transparent;
      border:1px solid rgba(0,212,255,0.35);
      color:var(--cyan);
      text-decoration:none;
      font-family:'Share Tech Mono', monospace;
      font-size:0.78rem; letter-spacing:0.18em;
      clip-path: polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
      position:relative; overflow:hidden;
      transition: color .3s, border-color .3s, box-shadow .3s;
    }
    .btn::before {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(90deg, rgba(0,212,255,0.12), transparent 60%);
      transform:translateX(-100%);
      transition:transform .4s ease;
    }
    .btn:hover {
      color:#fff; border-color:var(--cyan);
      box-shadow:0 0 24px rgba(0,212,255,0.25), inset 0 0 16px rgba(0,212,255,0.06);
      text-shadow:0 0 10px var(--cyan);
    }
    .btn:hover::before { transform:translateX(0); }
    .btn .arr { opacity:0.6; }

    /* ── Entrance ── */
    @keyframes fadeSlideIn {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Cursor -->
  <div id="cur"></div>
  <div id="cur-ring"></div>

  <!-- Main scene -->

  <script>
  // ── Custom cursor ──────────────────────────────────────
  const cur = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  const ch = document.getElementById('cur-cross-h');
  const cv = document.getElementById('cur-cross-v');
  let mx=0, my=0, rx=0, ry=0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx+'px'; cur.style.top = my+'px';
    ch.style.left = mx+'px'; ch.style.top = my+'px';
    cv.style.left = mx+'px'; cv.style.top = my+'px';
  });
  (function animRing() {
    rx += (mx-rx)*0.1; ry += (my-ry)*0.1;
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
    requestAnimationFrame(animRing);
  })();

  // ── Canvas background ──────────────────────────────────
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  // Particles
  const COLS = [
    [0,212,255], [255,60,172], [123,47,255], [160,190,240]
  ];
  const pts = Array.from({length:90}, () => ({
    x: Math.random()*1920, y: Math.random()*1080,
    vx: (Math.random()-.5)*0.28, vy: (Math.random()-.5)*0.22,
    r: Math.random()*1.8+0.4,
    c: COLS[Math.floor(Math.random()*COLS.length)],
    a: Math.random()*0.55+0.08,
    ph: Math.random()*Math.PI*2
  }));

  let t=0;
  function draw() {
    t+=0.008;
    ctx.clearRect(0,0,W,H);

    // Nebulae
    const nebulae = [
      {x:W*.18,y:H*.28,r:220,c:[0,80,160]},
      {x:W*.82,y:H*.72,r:180,c:[80,0,160]},
      {x:W*.5, y:H*.5, r:260,c:[0,40,100]},
    ];
    nebulae.forEach(n => {
      const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0, `rgba(${n.c},0.05)`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    });

    // Connection lines
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,180,255,${0.035*(1-d/110)})`;
          ctx.lineWidth=0.5; ctx.stroke();
        }
      }
    }

    // Particles
    pts.forEach(p => {
      p.ph+=0.018;
      const a = p.a*(0.65+0.35*Math.sin(p.ph));
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`;
      ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // ── Floating kanji runes ───────────────────────────────
  const RUNES = '迷失虚空错误寻觅消散404未知彼岸归途数据档案';
  function spawnRune() {
    const el = document.createElement('div');
    el.className = 'rune';
    el.textContent = RUNES[Math.floor(Math.random()*RUNES.length)];
    el.style.cssText = `
      left:${Math.random()*96+2}vw;
      font-size:${Math.random()*1.6+0.7}rem;
      animation-duration:${Math.random()*14+9}s;
      animation-delay:0s;
      opacity:0;
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 24000);
  }
  for(let i=0;i<10;i++) setTimeout(spawnRune, i*600);
  setInterval(spawnRune, 1800);

  // ── Orb follows cursor subtly (easter egg) ────────────
  const spiritWrap = document.querySelector('.spirit-wrap');
  document.addEventListener('mousemove', e => {
    const cx=window.innerWidth/2, cy=window.innerHeight/2;
    const dx=(e.clientX-cx)/cx, dy=(e.clientY-cy)/cy;
    spiritWrap.style.transform = `translate(${dx*6}px,${dy*4}px)`;
  });
  </script>
</body>
</html>
