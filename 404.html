<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | Navi·Gal资源检索站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { padding: 2rem; max-width: 500px; }
        .code {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        p { color: #9ca3af; margin-bottom: 1.5rem; line-height: 1.6; }
        a {
            display: inline-block;
            padding: 12px 32px;
            background: #6366f1;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        a:hover { background: #4f46e5; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">●︿●</div>
        <h1>啊哦，页面貌似被藏起来了</h1>
        <p>你访问的页面不存在或已被移动<br>请返回首页继续浏览</p>
        <a href="/">← 返回首页</a>
    </div>
</body>
</html>
